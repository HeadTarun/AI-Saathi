services:
  - type: web
    name: ai-saathi-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn service.service:app --app-dir src --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
